<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="/assets/vendor/inter-font-rsms-me/inter.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/img/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/assets/img/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Zhanna's SurveyStation" />
  <link rel="manifest" href="/assets/img/favicon/site.webmanifest" />

  <!-- Leaflet  -->
  <link rel="stylesheet" href="/assets/vendor/leaflet/leaflet.css" />
  <script src="/assets/vendor/leaflet/leaflet.js"></script>
  <!-- Leaflet Fullscreen -->
  <script src="/assets/vendor/leaflet-fullscreen/Leaflet.fullscreen.min.js"></script>
  <link href="/assets/vendor/leaflet-fullscreen/leaflet.fullscreen.css" rel="stylesheet" />
  <!-- Geocoder API -->
  <link rel="stylesheet" href="/assets/vendor/usgs-waterdata-geocoder/geocoder.min.css">
  <script src="/assets/vendor/usgs-waterdata-geocoder/geocoder.min.js"></script>
  <!-- Leaflet MapCenterCoord -->
  <link rel="stylesheet" href="/assets/css/leaflet-mapcentercoord.css">
  <script src="/assets/js/leaflet-mapcentercoord.js"></script>

  <title>{{ page.state }} USGS Quads | {{ site.title }}</title>

  <link rel="stylesheet" href="{{ page.css }}">

  {% if page.dev == true %}
  <script src="/assets/usgs-datasheets/data/{{ page.state | slugify }}.js"></script>
  {% elsif page.dev == false %}
  <script src="/assets/usgs-datasheets/data/{{ page.state | slugify }}.min.js"></script>
  {% else %}
  <script src="{{ page.jsondata }}"></script>
  {% endif %}

  <link href="/pagefind/pagefind-component-ui.css" rel="stylesheet">
  <script src="/pagefind/pagefind-component-ui.js" type="module"></script>
  <script src="/pagefind/pagefind-highlight.js" type="module"></script>
  <style>
    pagefind-modal-trigger {
      display: none;
    }

    :root {
      /* Colors */
      --pf-text: #1a1a1a;
      --pf-text-secondary: #666;
      --pf-text-muted: #767676;
      --pf-background: #fff;
      --pf-border: #e0e0e0;
      --pf-border-focus: #999;
      --pf-skeleton: #eee;
      --pf-skeleton-shine: #f5f5f5;
      --pf-hover: #f5f5f5;
      --pf-mark: #b91c1c;
      --pf-scroll-shadow: rgba(0, 0, 0, 0.08);

      /* Shadows */
      --pf-shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
      --pf-shadow-md: 0 4px 12px rgba(0, 0, 0, 0.1);
      --pf-shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.2);

      /* Error states */
      --pf-error-bg: #fef2f2;
      --pf-error-border: #fecaca;
      --pf-error-text: #dc2626;
      --pf-error-text-secondary: #b91c1c;

      /* Focus ring */
      --pf-outline-focus: #0969da;
      --pf-outline-width: 2px;
      --pf-outline-offset: 2px;

      /* Typography */
      --pf-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      /* Sizing */
      --pf-input-height: 36px;
      --pf-input-font-size: 16px;
      /* Keep at 16px+ to prevent iOS auto-zoom on focus */
      --pf-summary-font-size: 12px;
      --pf-result-title-font-size: 14px;
      --pf-result-excerpt-font-size: 13px;

      /* Results layout */
      --pf-results-display: flex;
      --pf-results-flex-direction: column;
      --pf-results-flex-wrap: nowrap;
      --pf-results-columns: none;
      /* grid-template-columns value, used when display is grid */
      --pf-results-gap: 8px;

      --pf-border-radius: 6px;
      --pf-image-width: 64px;
      --pf-image-height: 48px;

      /* Icons (SVG data URIs) */
      --pf-icon-search: url("data:image/svg+xml,...");
      --pf-icon-arrow: url("data:image/svg+xml,...");

      /* Modal */
      --pf-modal-backdrop: rgba(0, 0, 0, 0.5);
      --pf-modal-max-width: 560px;
      --pf-modal-max-height: min(80dvh, 800px);
      --pf-modal-top: 10dvh;

      /* Searchbox dimensions */
      --pf-searchbox-max-width: 480px;
      --pf-searchbox-dropdown-max-height: 320px;

      /* Dropdown settings */
      --pf-dropdown-max-height: 280px;
      --pf-dropdown-z-index: 9999;
    }
  </style>
</head>
